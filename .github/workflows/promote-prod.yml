name: Promote to prod

on:
  release:
    types: [published]

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Dispatch promotion to platform
        run: |
          APP_YAML_B64=$(base64 < app.yaml | tr -d '\n')
          curl -sf -X POST \
            -H "Authorization: token ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/easydeploytest/EasyDeploy/dispatches \
            -d "{\"event_type\":\"app-promote\",\"client_payload\":{\"version\":\"${{ github.event.release.tag_name }}\",\"repo_url\":\"$GITHUB_SERVER_URL/$GITHUB_REPOSITORY\",\"app_yaml_b64\":\"$APP_YAML_B64\"}}"
